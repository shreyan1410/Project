<!DOCTYPE html>
<html>
<head>
<title>Cart</title>
<link rel="stylesheet" href="style.css">

<style>

/* TOP BAR */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 30px;
background:linear-gradient(90deg,#5f9cff,#d946ef);
}

.left-icons span{
color:white;
font-size:28px;
margin-right:15px;
cursor:pointer;
}

.right-icons img{
width:35px;
margin-left:15px;
cursor:pointer;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
padding:30px;
}

/* CARD */
.card{
background:#f2f2f2;
border-radius:20px;
padding:15px;
text-align:center;
transition:0.3s;
}

.card img{
width:100%;
height:200px;
object-fit:contain;
cursor:pointer;
}

/* QTY BUTTONS */
.qty-btn{
padding:8px 12px;
border:none;
border-radius:10px;
background:#ddd;
cursor:pointer;
font-size:18px;
}

/* BILL */
.bill{
margin:20px;
padding:20px;
background:#f9f9f9;
border-radius:15px;
}

/* CHECKOUT BUTTON */
.checkout-btn{
margin-top:15px;
padding:15px;
width:100%;
border:none;
border-radius:30px;
background:linear-gradient(90deg,#00c6ff,#ff00cc);
color:white;
font-size:18px;
cursor:pointer;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
}

.modal-content{
background:white;
width:400px;
margin:100px auto;
padding:20px;
border-radius:15px;
}

/* INPUT */
input, textarea{
width:100%;
margin:10px 0;
padding:10px;
}

/* COD BOX */
.cod-box{
margin:15px 0;
padding:15px;
border-radius:10px;
background:linear-gradient(90deg,#00c6ff,#ff00cc);
color:white;
font-size:18px;
display:flex;
align-items:center;
gap:10px;
}

</style>

</head>

<body>

<!-- TOP BAR -->
<div class="topbar">

<div class="left-icons">
<span onclick="toggleTheme()">🌙</span>
<span>🌐 🇮🇳</span>
</div>

<div class="right-icons">

<img src="https://cdn.pixabay.com/photo/2015/12/28/02/58/home-1110868_1280.png"
onclick="window.location.href='home.html'">

<img src="https://static.vecteezy.com/system/resources/previews/036/885/313/original/blue-profile-icon-free-png.png">

<img src="https://cdn0.iconfinder.com/data/icons/social-messaging-ui-color-shapes/128/shopping-circle-blue-512.png">

</div>

</div>

<h2 style="text-align:center;">Your Cart 🛒</h2>

<div id="cartItems" class="grid"></div>

<!-- BILL -->
<div class="bill">
<h3>Bill Details</h3>
<p>Subtotal: ₹<span id="subtotal">0</span></p>
<p>GST (18%): ₹<span id="gst">0</span></p>
<h2>Total: ₹<span id="total">0</span></h2>

<button class="checkout-btn" onclick="openCheckout()">
Proceed to Checkout
</button>
</div>

<!-- CHECKOUT MODAL -->
<div id="checkoutModal" class="modal">
<div class="modal-content">

<h2 style="text-align:center;">Checkout</h2>

<input placeholder="Full Name">
<input placeholder="Phone Number">
<textarea placeholder="Delivery Address"></textarea>

<div class="cod-box">
<input type="checkbox" style="transform:scale(1.5);">
Cash on Delivery
</div>

<button class="checkout-btn" onclick="placeOrder()">
Confirm Order
</button>

</div>
</div>

<script>

/* LOAD CART */
let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* GROUP ITEMS */
function groupCart(){
let map = {};

cart.forEach(item=>{
let key = item.name;

if(!map[key]){
map[key] = {...item, qty:1};
}else{
map[key].qty++;
}
});

return Object.values(map);
}

/* RENDER */
function renderCart(){

let grouped = groupCart();
let container = document.getElementById("cartItems");

let subtotal = 0;

container.innerHTML = grouped.map(item=>{

subtotal += item.price * item.qty;

return `
<div class="card">

<img src="${item.image}" onclick="viewProduct('${item.name}')">

<h3>${item.name}</h3>

<p>₹${item.price} × ${item.qty}</p>

<div style="display:flex;justify-content:center;gap:10px;">

<button class="qty-btn" onclick="changeQty('${item.name}',1)">➕</button>
<button class="qty-btn" onclick="changeQty('${item.name}',-1)">➖</button>

</div>

</div>
`;

}).join("");

let gst = Math.floor(subtotal * 0.18);
let total = subtotal + gst;

document.getElementById("subtotal").innerText = subtotal;
document.getElementById("gst").innerText = gst;
document.getElementById("total").innerText = total;
}

renderCart();

/* CHANGE QTY */
function changeQty(name,delta){

if(delta === 1){
let item = cart.find(i=>i.name===name);
cart.push(item);
}else{
let index = cart.findIndex(i=>i.name===name);
if(index !== -1){
cart.splice(index,1);
}
}

localStorage.setItem("cart", JSON.stringify(cart));
renderCart();
}

/* VIEW PRODUCT */
function viewProduct(name){
let item = cart.find(i=>i.name===name);
localStorage.setItem("selectedProduct", JSON.stringify(item));
window.location="product.html";
}

/* CHECKOUT */
function openCheckout(){
document.getElementById("checkoutModal").style.display="block";
}

/* PLACE ORDER */
function placeOrder(){
alert("✅ Order Confirmed!");
localStorage.removeItem("cart");
window.location="home.html";
}

/* THEME */
function toggleTheme(){
document.body.classList.toggle("dark");
}

</script>

</body>
</html>
