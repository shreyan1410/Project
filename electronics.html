<!DOCTYPE html>
<html>
<head>
<title>Electronics</title>
<link rel="stylesheet" href="style.css">

<style>

/* SAME TOP BAR */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 30px;
background:linear-gradient(90deg,#5f9cff,#d946ef);
}

.left-icons span{
color:white;
font-size:28px;
margin-right:15px;
cursor:pointer;
}

.right-icons img{
width:35px;
margin-left:15px;
cursor:pointer;
}

/* SAME GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
padding:30px;
}

/* SAME CARD */
.card{
background:#f2f2f2;
border-radius:20px;
padding:15px;
text-align:center;
transition:0.3s;
}

.card img{
width:100%;
height:200px;
object-fit:contain;
cursor:pointer;
}

.card:hover{
transform:translateY(-10px);
}

/* SAME PRICE */
.card p{
color:#ff2e7a;
font-weight:bold;
}

/* SAME BUTTON */
.card button{
margin-top:10px;
padding:12px;
width:100%;
border:none;
border-radius:30px;
background:linear-gradient(90deg,#00c6ff,#ff00cc);
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

.card button:hover{
opacity:0.8;
}

</style>

</head>

<body>

<!-- TOP BAR (UNCHANGED) -->
<div class="topbar">

    <div class="left-icons">
        <span onclick="toggleTheme()">🌙</span>
        <span>🌐 🇮🇳</span>
    </div>

    <div class="right-icons">

        <!-- FIXED HOME -->
        <img src="https://cdn.pixabay.com/photo/2015/12/28/02/58/home-1110868_1280.png"
             onclick="window.location.href='home.html'">

        <img src="https://static.vecteezy.com/system/resources/previews/036/885/313/original/blue-profile-icon-free-png.png">

        <!-- CART -->
        <img src="https://cdn0.iconfinder.com/data/icons/social-messaging-ui-color-shapes/128/shopping-circle-blue-512.png"
             onclick="window.location.href='cart.html'">
    </div>

</div>

<h2 style="text-align:center;">Electronics</h2>

<div id="products" class="grid"></div>

<script>

/* ELECTRONICS PRODUCTS */
let products = [

/* TVs */
{id:1,name:"Samsung Smart TV",price:35000,image:"https://tse2.mm.bing.net/th/id/OIP.YFECkImjv92t-83uiRKOrAHaHV"},
{id:2,name:"LED TV",price:28000,image:"https://tse2.mm.bing.net/th/id/OIP.6OTYcSyp9zEdZKaqk6SeFQHaE7"},
{id:3,name:"HD TV",price:22000,image:"https://images.samsung.com/is/image/samsung/p6pim/in/ua32t4360akxxl/gallery/in-hd-t4310-ua32t4360akxxl-532971444"},
{id:4,name:"LG TV",price:30000,image:"https://www.lg.com/content/dam/channel/wcms/co/audio_y_video/tv/32lr650bpsa/32lr650-gallery/gallery/DZ-01.jpg"},

/* Washing Machine */
{id:5,name:"Washing Machine",price:25000,image:"https://wallpaperaccess.com/full/7150852.jpg"},
{id:6,name:"Automatic Washer",price:27000,image:"https://img.freepik.com/premium-photo/washing-machine-with-white-background-high-quality_889056-17818.jpg"},
{id:7,name:"LG Washer",price:32000,image:"https://mlvtgiqzoszz.i.optimole.com/Sb3K8mU-B-mYAy3A/w:auto/h:auto/q:90/https://www.appliancecity.co.uk/wp-content/uploads/2020/09/LG-f4v910btse-7-1.jpg"},
{id:8,name:"Compact Washer",price:20000,image:"https://pngimg.com/uploads/washing_machine/washing_machine_PNG15589.png"},

/* Iron */
{id:9,name:"Iron Box",price:1500,image:"https://purepng.com/public/uploads/large/purepng.com-iron-boxelectronicsiron-box-941524671385pqors.png"},
{id:10,name:"Steam Iron",price:2000,image:"https://purepng.com/public/uploads/large/purepng.com-iron-boxelectronicsiron-box-941524672041fnjtw.png"},

/* Fridge */
{id:11,name:"Modern Fridge",price:40000,image:"https://static.vecteezy.com/system/resources/previews/027/057/021/non_2x/modern-fridge-in-red-interior-with-copy-space-generative-ai-free-photo.jpeg"}

];

/* RENDER (SAME LOGIC) */
let container=document.getElementById("products");

container.innerHTML=products.map(p=>`
<div class="card">
<img src="${p.image}" onclick="viewProduct(${p.id})">
<h3>${p.name}</h3>
<p>₹${p.price}</p>

<button onclick="viewProduct(${p.id})">
View
</button>

</div>
`).join("");

/* SAME FUNCTIONS */
function viewProduct(id){
let product = products.find(p=>p.id==id);
localStorage.setItem("selectedProduct",JSON.stringify(product));
window.location="product.html";
}

function addToCart(product){
let cart = JSON.parse(localStorage.getItem("cart")) || [];
cart.push(product);
localStorage.setItem("cart", JSON.stringify(cart));
alert("✅ Successfully added to cart!");
}

function toggleTheme(){
document.body.classList.toggle("dark");
}

</script>

</body>
</html>
