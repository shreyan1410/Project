<!DOCTYPE html>
<html>
<head>
<title>Watches</title>
<link rel="stylesheet" href="style.css">

<style>

/* TOP BAR */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 30px;
background:linear-gradient(90deg,#5f9cff,#d946ef);
}

.left-icons span{
color:white;
font-size:28px;
margin-right:15px;
cursor:pointer;
}

.right-icons img{
width:35px;
margin-left:15px;
cursor:pointer;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
padding:30px;
}

/* CARD */
.card{
background:#f2f2f2;
border-radius:20px;
padding:15px;
text-align:center;
transition:0.3s;
}

.card img{
width:100%;
height:200px;
object-fit:contain;
cursor:pointer;
}

.card:hover{
transform:translateY(-10px);
}

/* PRICE */
.card p{
color:#ff2e7a;
font-weight:bold;
}

/* BUTTON (GRADIENT FIXED) */
.card button{
margin-top:10px;
padding:12px;
width:100%;
border:none;
border-radius:30px;
background:linear-gradient(90deg,#00c6ff,#ff00cc);
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

.card button:hover{
opacity:0.8;
}

</style>

</head>

<body>

<!-- TOP BAR -->
<div class="topbar">

    <div class="left-icons">
        <span onclick="toggleTheme()">🌙</span>
        <span>🌐 🇮🇳</span>
    </div>

    <div class="right-icons">

        <!-- ✅ FIXED HOME ICON -->
        <img src="https://cdn.pixabay.com/photo/2015/12/28/02/58/home-1110868_1280.png"
             onclick="window.location.href='home.html'">

        <img src="https://static.vecteezy.com/system/resources/previews/036/885/313/original/blue-profile-icon-free-png.png">

        <!-- CART -->
        <img src="https://cdn0.iconfinder.com/data/icons/social-messaging-ui-color-shapes/128/shopping-circle-blue-512.png"
onclick="goCart()">
    </div>

</div>

<h2 style="text-align:center;">Luxury Watches</h2>

<div id="products" class="grid"></div>

<script>

/* PRODUCTS */
let products = [

{id:1,name:"Rolex Premium",price:89999,image:"https://wallpapercave.com/wp/wp1853720.jpg"},
{id:2,name:"Classic Watch",price:45999,image:"https://wallpaperaccess.com/full/3046105.jpg"},
{id:3,name:"Luxury Watch",price:99999,image:"https://images.unsplash.com/photo-1582150264904-e0bea5ef0ad1"},
{id:4,name:"Elite Watch",price:120000,image:"https://wallpaperaccess.com/full/795918.jpg"},
{id:5,name:"Modern Watch",price:75000,image:"https://cdn.pixabay.com/photo/2024/12/06/09/09/watch-9248264_1280.jpg"},
{id:6,name:"Classic Gold",price:65000,image:"https://cdn.pixabay.com/photo/2017/12/08/11/16/clock-3005574_1280.jpg"},
{id:7,name:"Luxury Steel",price:88000,image:"https://usa.watchpro.com/cloud/2023/09/27/Rolex-Bob-4.jpg"},
{id:8,name:"Diamond Watch",price:150000,image:"https://wallpapercave.com/wp/wp1853721.jpg"}

];
let search = localStorage.getItem("search");

if(search){
products = products.filter(p =>
p.name.toLowerCase().includes(search)
);
}

/* RENDER */
let container=document.getElementById("products");

container.innerHTML=products.map(p=>`
<div class="card">
<img src="${p.image}" onclick="viewProduct(${p.id})">
<h3>${p.name}</h3>
<p>₹${p.price}</p>




<!-- ✅ FIXED BUTTON -->
<button onclick="viewProduct(${p.id})">
View
</button>

</div>
`).join("");

/* VIEW PRODUCT */
function viewProduct(id){
let product = products.find(p=>p.id==id);
localStorage.setItem("selectedProduct",JSON.stringify(product));
window.location="product.html";
}

/* ADD TO CART (POPUP FIXED) */
function addToCart(product){
let cart = JSON.parse(localStorage.getItem("cart")) || [];
cart.push(product);
localStorage.setItem("cart", JSON.stringify(cart));

alert("✅ Successfully added to cart!");
}

/* THEME */
function toggleTheme(){
document.body.classList.toggle("dark");
}

</script>


</body>
</html>
